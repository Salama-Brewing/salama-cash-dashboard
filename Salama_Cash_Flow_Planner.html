body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F3F4F6;color:#1F2937}
.header{background:linear-gradient(135deg,#1A1A2E,#16213E);color:#fff;padding:16px 24px}
.header h1{color:#E91E8C;font-size:24px;font-weight:700}

.header-stats{display:flex;gap:20px;font-size:13px;align-items:center;flex-wrap:wrap}

.tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.tab.active{background:#F3F4F6;color:#1F2937}
.content{padding:16px 24px 32px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:8px;border:1px solid #E5E7EB;padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:900px){.grid3,.grid4,.grid5,.grid6{grid-template-columns:1fr 1fr}.header-top{flex-direction:column;align-items:flex-start}}
@media(max-width:600px){.grid2,.grid3,.grid4,.grid5,.grid6{grid-template-columns:1fr}}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6B7280}
.kpi-value{font-size:22px;font-weight:700;margin-top:4px}
.kpi-sub{font-size:11px;color:#9CA3AF;margin-top:2px}
.alert{padding:12px 16px;border-radius:0 6px 6px 0;font-size:13px;font-weight:600;margin-bottom:12px}
.alert-red{background:#FEF2F2;border-left:4px solid #DC2626;color:#991B1B}
.alert-green{background:#F0FDF4;border-left:4px solid #16A34A;color:#166534}
.alert-blue{background:#EFF6FF;border-left:4px solid #2563EB;color:#1E40AF}
.alert-amber{background:#FFFBEB;border-left:4px solid #D97706;color:#92400E}

.sev-fill{height:8px;border-radius:4px}
.chart-container{position:relative;width:100%;height:360px;margin-top:8px}
canvas{display:block}
.toggle-switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#D1D5DB;transition:.3s;border-radius:24px}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
input:checked+.toggle-slider{background:#E91E8C}

// --- BEMBÖLE P&L ---
function getBemboleMonthly(){
  var rev = bemboleRevenue.shopSales + bemboleRevenue.ownBar + bemboleRevenue.contractBrewing;
  var personnel = staffData.reduce(function(s,p){return s+(p.bembole&&p.active?p.total:0)},0);

  var opex = bemboleCosts.rent + bemboleCosts.utilities + bemboleCosts.supplies + bemboleCosts.maintenance;
  var totalCost = personnel + materialsCost + opex;
  var netContribution = rev - totalCost;
  return {rev:rev, personnel:personnel, materialsCost:materialsCost, opex:opex, totalCost:totalCost, net:netContribution};
}

// --- PROJECTION ENGINE ---
function getProjection(){
  var result = [];
  var cumCash = STARTING_CASH;

  for(var m=0;m<10;m++){
    // 1) Revenue deviation → EBITDA impact (variable costs scale, fixed don't)
    var ebitdaFromDeviation = Math.round(BUDGET_SALES[m] * (state.deviation/100) * GM_RATE);

    // 2) Personnel savings (respecting notice periods)
    var personnelSavings = 0;
    staffData.forEach(function(s){
      if(!s.active && m >= s.noticeMo) personnelSavings += s.total;
    });

    // 3) Cost savings (vs original baseline)
    var costSavings = 0;
    costsData.forEach(function(c,i){
      if(c.locked) return; // rents not adjustable
      if(!c.active) costSavings += origCostMonthly[i];
      else costSavings += origCostMonthly[i] - c.monthly;
    });
    consultantsData.forEach(function(c,i){
      if(!c.active && origConsultantActive[i]) costSavings += origConsultantMonthly[i];
    });

    // 3b) Bemböle closure impact (net: lose revenue, save costs+personnel)
    var bemboleImpact = 0;
    if(state.bemboleClosed){
      var bp = getBemboleMonthly();
      // We lose the revenue (at GM rate, since materials scale) but save opex + personnel
      var revLostGM = Math.round(bp.rev * GM_RATE); // GM contribution lost
      var costsSaved = bp.opex + bp.personnel; // rent + utilities + supplies + maintenance + staff
      bemboleImpact = costsSaved - revLostGM; // positive = net saving, negative = net loss
    }

    // 3c) New CEO hire (additional cost, not in budget)
    var newCEOCost = 0;
    if(state.newCEO && m >= state.newCEOMonth){
      newCEOCost = -state.newCEOCost;
    }

    // 4) Adjusted EBITDA
    var totalDelta = ebitdaFromDeviation + personnelSavings + costSavings + bemboleImpact + newCEOCost;
    var adjEBITDA = BUDGET_EBITDA[m] + totalDelta;

    // 5) Financing (equity conversion removes junior debt)
    var junior = (m===5 && !state.equityConversion) ? JUNIOR_REPAY_AUG + INTEREST_AUG : 0;
    var fundraise = (state.fundraiseOn && m===state.fundraiseMonth) ? state.fundraiseAmount : 0;
    var financing = SENIOR_DEBT + junior + fundraise;

    // 6) Net
    var net = Math.round(adjEBITDA) + financing;
    cumCash += net;

    result.push({
      month: MONTHS[m]+" 26",
      budgetEBITDA: BUDGET_EBITDA[m],
      adjEBITDA: Math.round(adjEBITDA),
      delta: totalDelta,
      personnelSav: personnelSavings,
      costSav: costSavings,
      devImpact: ebitdaFromDeviation,
      seniorDebt: SENIOR_DEBT,
      juniorDebt: (m===5)?JUNIOR_REPAY_AUG:0,
      interest: (m===5)?INTEREST_AUG:0,
      fundraise: fundraise,
      financing: financing,
      net: Math.round(net),
      closingCash: Math.round(cumCash)
    });
  }
  return result;
}

// ===== STRESS TEST ENGINE =====
// Run a projection at a given deviation with optional overrides
function runScenario(dev, opts){
  opts = opts || {};
  var oldDev = state.deviation;
  var oldEquity = state.equityConversion;
  var oldBembole = state.bemboleClosed;
  var oldFundraise = state.fundraiseOn;
  var oldFundAmt = state.fundraiseAmount;
  var oldFundMo = state.fundraiseMonth;
  // Store old cost/consultant state
  var oldCostMonthly = costsData.map(function(c){return c.monthly});
  var oldCostActive = costsData.map(function(c){return c.active});
  var oldConsActive = consultantsData.map(function(c){return c.active});

  // Apply overrides
  state.deviation = dev;
  if(opts.equity !== undefined) state.equityConversion = opts.equity;
  if(opts.closeBembole !== undefined) state.bemboleClosed = opts.closeBembole;
  if(opts.fundraise !== undefined){ state.fundraiseOn = opts.fundraise; state.fundraiseAmount = opts.fundAmt||200000; state.fundraiseMonth = opts.fundMo||0; }
  if(opts.leanOps){
    costsData.forEach(function(c){
      if(c.id==="marketing") c.monthly=2000;
      if(c.id==="outside_svc") c.monthly=1500;
      if(c.id==="other") c.monthly=1500;
    });
    consultantsData.forEach(function(c){
      if(c.id!=="pruulmeistrid"&&c.id!=="e6") c.active=false;
    });
  }

  var proj = getProjection();

  // Restore state
  state.deviation = oldDev;
  state.equityConversion = oldEquity;
  state.bemboleClosed = oldBembole;
  state.fundraiseOn = oldFundraise;
  state.fundraiseAmount = oldFundAmt;
  state.fundraiseMonth = oldFundMo;
  costsData.forEach(function(c,i){c.monthly=oldCostMonthly[i];c.active=oldCostActive[i]});
  consultantsData.forEach(function(c,i){c.active=oldConsActive[i]});

  return proj;
}

function analyzeScenario(proj){
  var endCash = proj[9].closingCash;
  var lowest = proj[0].closingCash;
  var lowestMonth = 0;
  var negMonths = 0;
  var firstNeg = -1;
  for(var i=0;i<proj.length;i++){
    if(proj[i].closingCash < lowest){ lowest = proj[i].closingCash; lowestMonth = i; }
    if(proj[i].closingCash < 0){ negMonths++; if(firstNeg===-1) firstNeg=i; }
  }
  return {endCash:endCash, lowest:lowest, lowestMonth:lowestMonth, negMonths:negMonths, firstNeg:firstNeg, fundingGap: endCash<0?Math.abs(endCash):0};
}

    {name:"Equity + lean + close Bemb.",opts:{equity:true,leanOps:true,closeBembole:true}},
    {name:"Equity + lean + fundraise €200K",opts:{equity:true,leanOps:true,fundraise:true,fundAmt:200000,fundMo:0}},
    {name:"Equity + lean + fundraise €300K",opts:{equity:true,leanOps:true,fundraise:true,fundAmt:300000,fundMo:0}},
    {name:"All levers + €500K raise",opts:{equity:true,leanOps:true,closeBembole:true,fundraise:true,fundAmt:500000,fundMo:0}}
  ];
  var results = [];
  strategies.forEach(function(s){
    var proj = runScenario(dev, s.opts);
    var a = analyzeScenario(proj);
    results.push({name:s.name, endCash:a.endCash, lowest:a.lowest, survives:a.endCash>=0 && a.lowest>=-50000, negMonths:a.negMonths});
  });
  return results;
}

// Test each single lever's impact vs baseline
function getSensitivity(){
  var baseline = analyzeScenario(runScenario(0, {}));
  var levers = [
    {name:"Fundraise €200K (Mar)",impact:200000},
    {name:"Equity conversion",impact:analyzeScenario(runScenario(0,{equity:true})).endCash - baseline.endCash},
    {name:"Cut all consultants",impact:consultantsData.reduce(function(s,c){return s+(c.active?c.monthly:0)},0)*10 - consultantsData.filter(function(c){return c.id==="pruulmeistrid"||c.id==="e6"}).reduce(function(s,c){return s+c.monthly},0)*10},
    {name:"Lean operations",impact:analyzeScenario(runScenario(0,{leanOps:true})).endCash - baseline.endCash},
    {name:"Revenue +5%",impact:analyzeScenario(runScenario(5,{})).endCash - baseline.endCash},
    {name:"Revenue +10%",impact:analyzeScenario(runScenario(10,{})).endCash - baseline.endCash},
    {name:"Close Bemböle",impact:analyzeScenario(runScenario(0,{closeBembole:true})).endCash - baseline.endCash}
  ];
  levers.sort(function(a,b){return b.impact-a.impact});
  return levers;
}

// Find minimum deviation to stay cash-positive under different conditions
function findThreshold(opts){
  for(var d=30;d>=-30;d--){
    var a = analyzeScenario(runScenario(d, opts));
    if(a.endCash < 0 || a.lowest < -50000) return d+1;
  }
  return -30;
}

      html+='</tbody></table></div>';

      // AP aging
      html+='<div class="card"><div class="section-title">AP Aging Buckets</div>';
      var agTot=ap.total_open||1;
      [['Current (0\u201330d)',ap.aging['0_30'],'#16A34A'],['31\u201360 days',ap.aging['31_60'],'#EA580C'],['61\u201390 days',ap.aging['61_90'],'#DC2626'],['90+ days',ap.aging['90_plus'],'#7C3AED']].forEach(function(row){
        var pct=Math.round(row[1]/agTot*100)||0;
        html+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:600">'+row[0]+'</span><span style="font-family:monospace;font-size:13px">'+fmtE(row[1])+'<span style="color:#9CA3AF;font-weight:400"> ('+pct+'%)</span></span></div>';
        html+='<div style="height:10px;background:#F3F4F6;border-radius:5px"><div style="width:'+pct+'%;height:10px;background:'+row[2]+';border-radius:5px;transition:width .3s"></div></div></div>';
      });
      html+='</div>';

      html+='</div>'; // grid2

      // Invoice list
      html+='<div class="card"><div class="section-title">Open Invoices \u2014 Pay by Due Date</div>';
      html+='<table><thead><tr><th style="text-align:left">Supplier</th><th>Invoice Date</th><th>Due Date</th><th>Amount</th><th>Status</th><th>Recommendation</th></tr></thead><tbody>';
      var sortedInv=ap.invoices.slice().sort(function(a,b){return a.dueDate.localeCompare(b.dueDate);});
      sortedInv.forEach(function(inv){
        var isOverdue=inv.status==='OVERDUE';
        var dueDate=new Date(inv.dueDate);
        var now=new Date();
        var daysUntil=Math.round((dueDate-now)/86400000);
        var urgency=isOverdue?'#FEF2F2':daysUntil<=7?'#FFFBEB':'';
        var rec=isOverdue?'<span style="color:#DC2626;font-weight:600">Pay immediately</span>':daysUntil<=7?'<span style="color:#EA580C;font-weight:600">Pay this week</span>':daysUntil<=14?'<span style="color:#D97706">Pay in '+daysUntil+'d</span>':'<span style="color:#16A34A">Pay in '+daysUntil+'d</span>';
        html+='<tr'+(urgency?' style="background:'+urgency+'"':'')+'>';
        html+='<td style="text-align:left;font-weight:600">'+inv.counterpartyName+'</td>';
        html+='<td style="color:#6B7280;font-weight:400">'+inv.date+'</td>';
        html+='<td style="font-weight:600;color:'+(daysUntil<0?'#DC2626':daysUntil<=7?'#EA580C':'#1F2937')+'">'+inv.dueDate+(daysUntil<0?' ('+Math.abs(daysUntil)+'d overdue)':daysUntil===0?' (today)':'')+'</td>';
        html+='<td class="txt-org bold">'+fmtE(inv.totalAmount)+'</td>';
        html+='<td><span style="background:'+(isOverdue?'#FEE2E2':daysUntil<=7?'#FEF9C3':'#DCFCE7')+';color:'+(isOverdue?'#991B1B':daysUntil<=7?'#854D0E':'#166534')+';padding:2px 8px;border-radius:4px;font-size:11px">'+(isOverdue?'OVERDUE':daysUntil<=7?'DUE SOON':'UNPAID')+'</span></td>';
        html+='<td>'+rec+'</td></tr>';
      });
      html+='</tbody></table></div>';
    }
  }

  html += '</div>'; // content

  // Footer
  html += '<div class="footer">Salama Brewing Scenario Planner | Source: LivePlan export 23 Mar 2026 + Procountor data | Jr debt \u2192 equity confirmed | Interactive model \u2014 not financial advice</div>';

  document.getElementById('app').innerHTML = html;

  if(state.activeTab==="Scenario") drawChart(proj);
  if(state.activeTab==="Cash Position" && cashData) drawCashForecastChart();
  if(state.activeTab==="Working Capital" && cashData) drawWCCharts();
}

// ===== CHART =====
function drawChart(proj){
  var canvas = document.getElementById('mainChart');
  if(!canvas) return;
  if(typeof Chart === 'undefined'){
    // Chart.js not loaded yet — store pending data and poll
    window.__pendingChart = proj;
    var attempts = 0;
    var poller = setInterval(function(){
      attempts++;
      if(typeof Chart !== 'undefined'){
        clearInterval(poller);
        window.__pendingChart = null;
        drawChart(proj);
      } else if(attempts > 50){ // 10 seconds
        clearInterval(poller);
        var ctx = canvas.getContext('2d');
        if(ctx){ctx.font='14px sans-serif';ctx.fillStyle='#DC2626';ctx.fillText('Chart library failed to load. Check network connection.',20,40);}
      }
    }, 200);
    return;
  }
  if(chart) chart.destroy();

  chart = new Chart(canvas, {
    type:'bar',
    data:{
      labels: proj.map(function(p){return p.month}),
      datasets:[
        {
          label:'Budget EBITDA',
          data: proj.map(function(p){return p.budgetEBITDA}),
          backgroundColor:'rgba(156,163,175,0.35)',
          borderRadius:4,
          order:3
        },
        {
          label:'Adj. EBITDA',
          data: proj.map(function(p){return p.adjEBITDA}),
          backgroundColor: proj.map(function(p){return p.adjEBITDA>=0?'rgba(22,163,74,0.6)':'rgba(220,38,38,0.6)'}),
          borderRadius:4,
          order:2
        },
        {
          label:'Closing Cash',
          data: proj.map(function(p){return p.closingCash}),
          type:'line',
          borderColor:'#E91E8C',
          backgroundColor:'#E91E8C',
          borderWidth:3,
          pointRadius:5,
          pointBackgroundColor: proj.map(function(p){return p.closingCash>=0?'#E91E8C':'#DC2626'}),
          tension:0.2,
          order:1,
          yAxisID:'y'
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{position:'bottom',labels:{usePointStyle:true,padding:16}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmtE(ctx.parsed.y)}}}
      },
      scales:{
        x:{grid:{display:false}},
        y:{
          ticks:{callback:function(v){return fmtK(v)}},
          grid:{color:'#F3F4F6'}
        }
      }
    }
  });
}

// ===== WORKING CAPITAL CHARTS =====
function drawWCCharts(){
  if(!cashData||typeof Chart==='undefined'){
    if(typeof Chart==='undefined'){setTimeout(drawWCCharts,300);}
    return;
  }
  var wc=cashData.working_capital;
  var trends=(wc.monthly_wc_trends||[]).slice(-18);

  // Chart 1: DSO/DPO/CCC trend
  var c1=document.getElementById('wcTrendChart');
  if(c1){
    if(cashCharts.wcTrend){cashCharts.wcTrend.destroy();}
    cashCharts.wcTrend=new Chart(c1,{
      type:'line',
      data:{
        labels:trends.map(function(t){return t.label;}),
        datasets:[
          {label:'DSO',data:trends.map(function(t){return t.dso;}),borderColor:'#DC2626',backgroundColor:'rgba(220,38,38,0.08)',borderWidth:2.5,pointRadius:3,tension:0.3,fill:false},
          {label:'DPO',data:trends.map(function(t){return t.dpo;}),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.08)',borderWidth:2.5,pointRadius:3,tension:0.3,fill:false},
          {label:'CCC',data:trends.map(function(t){return t.ccc;}),borderColor:'#E91E8C',backgroundColor:'rgba(233,30,140,0.08)',borderWidth:2,pointRadius:3,tension:0.3,fill:true,borderDash:[4,4]}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:12}},
          tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y+' days';}}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45}},
          y:{ticks:{callback:function(v){return v+'d';}},grid:{color:'#F3F4F6'},min:0}
        }
      }
    });
  }

  // Chart 2: Revenue vs AR outstanding
  var c2=document.getElementById('wcArRevenueChart');
  if(c2){
    if(cashCharts.wcAR){cashCharts.wcAR.destroy();}
    cashCharts.wcAR=new Chart(c2,{
      type:'bar',
      data:{
        labels:trends.map(function(t){return t.label;}),
        datasets:[
          {label:'Revenue Billed',data:trends.map(function(t){return t.revenue_billed;}),backgroundColor:'rgba(234,179,8,0.5)',borderRadius:3,order:2},
          {label:'AR Outstanding',data:trends.map(function(t){return t.ar_at_eom;}),type:'line',borderColor:'#2563EB',backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,tension:0.3,order:1}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{usePointStyle:true,padding:12}},
          tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmtE(ctx.parsed.y);}}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45}},
          y:{ticks:{callback:function(v){return fmtK(v);}},grid:{color:'#F3F4F6'}}
        }
      }
    });
  }
}

// ===== CASH FORECAST CHART =====
function drawCashForecastChart(){
  var canvas=document.getElementById('cashForecastChart');
  if(!canvas||typeof Chart==='undefined'){
    if(typeof Chart==='undefined'){setTimeout(drawCashForecastChart,300);}
    return;
  }
  if(cashCharts.forecast){cashCharts.forecast.destroy();}
  var weeks=cashData.forecast.weeks;
  var labels=weeks.map(function(w){return 'W'+w.week+' '+w.start_date.slice(5);});
  var balances=weeks.map(function(w){return w.closing_balance;});
  var barColors=weeks.map(function(w){return w.closing_balance>=20000?'rgba(22,163,74,0.7)':w.closing_balance>=0?'rgba(234,179,8,0.7)':'rgba(220,38,38,0.7)';});
  cashCharts.forecast=new Chart(canvas,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[
        {label:'Cash In',data:weeks.map(function(w){return w.cash_in;}),backgroundColor:'rgba(37,99,235,0.4)',borderRadius:3,stack:'flows'},
        {label:'Cash Out',data:weeks.map(function(w){return w.cash_out;}),backgroundColor:'rgba(220,38,38,0.4)',borderRadius:3,stack:'flows'},
        {label:'Closing Balance',data:balances,type:'line',borderColor:'#E91E8C',backgroundColor:'transparent',borderWidth:3,pointRadius:5,pointBackgroundColor:barColors,tension:0.2,yAxisID:'y',stack:undefined}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{position:'bottom',labels:{usePointStyle:true,padding:14}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmtE(ctx.parsed.y);}}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10}}},
        y:{ticks:{callback:function(v){return fmtK(v);}},grid:{color:'#F3F4F6'},
          afterDataLimits:function(axis){if(axis.min>-5000&&axis.max<5000){axis.min=-10000;axis.max=20000;}}
        }
      }
    }
  });
}

// ===== EVENT HANDLERS =====
function switchTab(t){state.activeTab=t;state.selectedOffender=null;render()}
function updState(key,val){state[key]=val;render()}

function toggleFundraise(){state.fundraiseOn=!state.fundraiseOn;render()}
function toggleEquity(){state.equityConversion=!state.equityConversion;render()}
function toggleStaff(i){staffData[i].active=!staffData[i].active;render()}
function toggleCost(i){costsData[i].active=!costsData[i].active;render()}
function toggleConsultant(i){consultantsData[i].active=!consultantsData[i].active;render()}
function updateCost(i,val){costsData[i].monthly=Math.max(0,Number(val)||0);render()}
function toggleOffender(rank){state.selectedOffender=state.selectedOffender===rank?null:rank;render()}

function toggleNewCEO(){state.newCEO=!state.newCEO;render()}
function toggleBembole(){state.bemboleClosed=!state.bemboleClosed;render()}
function toggleBemboleStaff(i){staffData[i].bembole=!staffData[i].bembole;render()}
function updateBemboleRev(key,val){bemboleRevenue[key]=Math.max(0,Number(val)||0);render()}
function updateBemboleCost(key,val){bemboleCosts[key]=Math.max(0,Number(val)||0);render()}
function resetBembole(){
  bemboleRevenue.shopSales=bemboleOrigRevenue.shopSales;
  bemboleRevenue.ownBar=bemboleOrigRevenue.ownBar;
  bemboleRevenue.contractBrewing=bemboleOrigRevenue.contractBrewing;
  bemboleCosts.utilities=bemboleOrigCosts.utilities;
  bemboleCosts.supplies=bemboleOrigCosts.supplies;
  bemboleCosts.maintenance=bemboleOrigCosts.maintenance;
  state.bemboleClosed=false;
  staffData.forEach(function(s){
    s.bembole = (s.id==="laitila"||s.id==="wang");
  });
  render();
}

function quickCutConsultants(){
  consultantsData.forEach(function(c){
    if(c.id!=="pruulmeistrid"&&c.id!=="e6") c.active=false;
  });
  render();
}

function quickLeanOps(){
  quickCutConsultants();
  costsData.forEach(function(c){
    if(c.id==="marketing") c.monthly=2000;
    if(c.id==="outside_svc") c.monthly=1500;
    if(c.id==="other") c.monthly=1500;
  });
  render();
}

function resetAll(){
  state.deviation=0;
  state.fundraiseOn=false;
  state.fundraiseAmount=200000;
  state.fundraiseMonth=0;
  state.equityConversion=false;
  state.bemboleClosed=false;
  state.newCEO=false;state.newCEOCost=10000;state.newCEOMonth=3;
  staffData.forEach(function(s){s.active=true;s.bembole=(s.id==="laitila"||s.id==="wang")});
  bemboleRevenue.shopSales=bemboleOrigRevenue.shopSales;bemboleRevenue.ownBar=bemboleOrigRevenue.ownBar;bemboleRevenue.contractBrewing=bemboleOrigRevenue.contractBrewing;
  bemboleCosts.utilities=bemboleOrigCosts.utilities;bemboleCosts.supplies=bemboleOrigCosts.supplies;bemboleCosts.maintenance=bemboleOrigCosts.maintenance;
  costsData.forEach(function(c,i){c.active=origCostActive[i];c.monthly=origCostMonthly[i]});
  consultantsData.forEach(function(c,i){c.active=origConsultantActive[i];c.monthly=origConsultantMonthly[i]});
  render();
}

// ===== INIT =====
render();
</script>
