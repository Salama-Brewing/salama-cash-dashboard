// AI PREDICTION ENGINE
// ════════════════════════════════════════════════════════════
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diffDays(a,b){return Math.round((b-a)/86400000);}
function fmtDate(d){return d.toLocaleDateString("fi-FI",{day:"numeric",month:"short"});}
function isWeekend(d){var dow=d.getDay();return dow===0||dow===6;}
function nextBizDay(d){var r=new Date(d);while(isWeekend(r))r.setDate(r.getDate()+1);return r;}
function lastBizDayOfMonth(yr,mo){var d=new Date(yr,mo,0);while(isWeekend(d))d.setDate(d.getDate()-1);return d;}

// Compute growth factor from historical monthly trends
function calcGrowthFactor(cd){
  var t=((cd||{}).working_capital||{}).monthly_wc_trends||[];
  if(t.length<13)return 1.19; // estimated 19% growth from budget YoY
  var rec=t.slice(-3).reduce((s,x)=>s+(x.revenue||0),0)/3;
  var old=t.slice(-15,-12).reduce((s,x)=>s+(x.revenue||0),0)/3;
  return old>0?rec/old:1.19;
}

// Predict when an invoice will actually be paid
function predictPayment(inv, growthFactor){
  var name=inv.counterpartyName;
  var p=PROFILES[name]||{dso:30,std:5,seasonal:true,color:"#9CA3AF"};
  var invDate=new Date(inv.date);
  var month=invDate.getMonth()+1;
  var seas=p.seasonal?(SEAS[month]||0):0;
  // Growth penalty: large customers slow down AP as invoice sizes grow
  var growthPenalty=(growthFactor>1.2&&p.dso>30)?Math.round((growthFactor-1)*4):0;
  var adjDso=p.dso+seas+growthPenalty;
  var predicted=addDays(invDate,adjDso);
  // If predicted is already past and invoice still open → overdue pattern, use today + recovery
  var isOverdue=new Date(inv.dueDate)<TODAY;
  var daysOverdue=isOverdue?diffDays(new Date(inv.dueDate),TODAY):0;
  var outsidePattern=isOverdue&&daysOverdue>p.std;
  if(outsidePattern){
    // Recovery: historical pattern says ~3× std to resolve, from today
    predicted=addDays(TODAY,p.std*2);
  }
  var daysFromToday=diffDays(TODAY,predicted);
  var conf=growthPenalty>0?"medium":(p.std<=3?"high":p.std<=6?"medium":"low");
  return {predicted,early:addDays(invDate,adjDso-p.std),late:addDays(invDate,adjDso+p.std),
    daysFromToday,adjDso,seas,growthPenalty,outsidePattern,daysOverdue,conf,profile:p};
}

// Build AI insights summary from all data
function buildInsights(cd, growthFactor){
  var invoices=((cd||{}).receivables||{}).invoices||[];
  var alerts=[], actions=[];
  var today=TODAY;

  // Overdue analysis
  invoices.forEach(inv=>{
    if(inv.status!=="OVERDUE")return;
    var pred=predictPayment(inv,growthFactor);
    var daysOvd=pred.daysOverdue;
    var sev=daysOvd>pred.profile.std*2?"urgent":daysOvd>pred.profile.std?"warning":"normal";
    if(sev==="urgent"){
      actions.push({level:"urgent",icon:"🚨",title:`Call ${inv.counterpartyName} — ${daysOvd}d overdue`,
        desc:`Invoice #${inv.id} €${inv.totalAmount.toLocaleString("fi-FI")} — ${daysOvd} days outside normal pattern. Expected now: ${fmtDate(pred.predicted)}`,
        amount:inv.totalAmount,customer:inv.counterpartyName});
    } else if(sev==="warning"){
      actions.push({level:"warning",icon:"⚡",title:`Follow up ${inv.counterpartyName}`,
        desc:`Invoice #${inv.id} €${inv.totalAmount.toLocaleString("fi-FI")} — ${daysOvd}d overdue, within normal range. Expected: ${fmtDate(pred.predicted)}`,
        amount:inv.totalAmount,customer:inv.counterpartyName});
    }
  });

  // This week's expected payments
  var weekEnd=addDays(today,7);
  var thisWeekIn=invoices.filter(inv=>{
    var pred=predictPayment(inv,growthFactor);
    return pred.predicted>=today&&pred.predicted<=weekEnd;
  });
  var thisWeekTotal=thisWeekIn.reduce((s,i)=>s+i.totalAmount,0);

  // Fixed outflows this week
  var thisWeekOut=0;
  for(var d=0;d<7;d++){
    var dt=addDays(today,d);
    thisWeekOut+=getFixedForDay(dt);
  }

  // Growth DSO alert
  if(growthFactor>1.25){
    alerts.push({icon:"📈",text:`Revenue growing ${((growthFactor-1)*100).toFixed(0)}% YoY. Slow-paying customers (Bars & Pubs, Export) may stretch DSO as invoice sizes grow. Monitor closely.`});
  }
  if(actions.filter(a=>a.level==="urgent").length===0&&thisWeekTotal>0){
    actions.push({level:"info",icon:"✓",title:`${thisWeekIn.length} payments expected this week`,
      desc:`Total: €${Math.round(thisWeekTotal).toLocaleString("fi-FI")} — net week: €${Math.round(thisWeekTotal-thisWeekOut).toLocaleString("fi-FI")}`,
      amount:thisWeekTotal});
  }

  return {actions,alerts,thisWeekIn,thisWeekTotal,thisWeekOut,growthFactor};
}

// Get fixed outflow amount for a specific date
function getFixedForDay(dt){
  var d=dt.getDate(),mo=dt.getMonth(),yr=dt.getFullYear(),total=0;
  FIXED.forEach(f=>{
    if(f.day===-1){
      var lbd=lastBizDayOfMonth(yr,mo+1);
      if(lbd.toDateString()===dt.toDateString())total+=f.amt;
    } else if(f.day===d)total+=f.amt;
  });
  return total;
}

// Build 7-day daily forecast
function build7Day(cd, growthFactor){
  var invoices=((cd||{}).receivables||{}).invoices||[];
  var days=[];
  var bank=((cd||{}).bank||{}).balance??-5200;
  var bal=bank;
  for(var i=0;i<7;i++){
    var dt=addDays(TODAY,i);
    var inflow=[];
    invoices.forEach(inv=>{
      var pred=predictPayment(inv,growthFactor);
      if(fmtDate(pred.predicted)===fmtDate(dt)){
        inflow.push({name:inv.counterpartyName,amount:inv.totalAmount,invId:inv.id,conf:pred.conf});
      }
    });
    var fixedOut=getFixedForDay(dt);
    var fixedItems=[];
    FIXED.forEach(f=>{
      if(f.day===-1){
        var lbd=lastBizDayOfMonth(dt.getFullYear(),dt.getMonth()+1);
        if(lbd.toDateString()===dt.toDateString())fixedItems.push(f);
      } else if(f.day===dt.getDate())fixedItems.push(f);
    });
    var totalIn=inflow.reduce((s,x)=>s+x.amount,0);
    var net=totalIn-fixedOut;
    bal+=net;
    days.push({dt,label:fmtDate(dt),totalIn,fixedOut,net,bal:bal,inflow,fixedItems,isToday:i===0});
  }
  return days;
}

// Build 13-week forecast (use cashData.forecast.weeks if available, else generate)
function build13Week(cd, scenario){
  var weeks=(cd||{}).forecast?.weeks||[];
  if(weeks.length===13)return weeks; // use Procountor-generated data

  // Generate from budget data
  var results=[], bal=APR1;
  var budRev=getRevArray();
  var budDir=getDirArray(), budExp=getExpArray();
  for(var w=0;w<13;w++){
    var startDt=addDays(new Date("2026-03-25"),w*7);
    var endDt=addDays(startDt,6);
    var monthIdx=startDt.getMonth(); // 0-based
    // Collections: prev month's billings arriving (DSO ~30d)
    var prevIdx=monthIdx===0?11:monthIdx-1;
    var weeklyIn=Math.round(budRev[prevIdx]/4.3);
    // Outflows: fixed + variable
    var fixedOut=0, fixedItems=[];
    for(var d=0;d<7;d++){
      var dt=addDays(startDt,d);
      FIXED.forEach(f=>{
        if(f.day===-1){var lbd=lastBizDayOfMonth(dt.getFullYear(),dt.getMonth()+1);if(lbd.toDateString()===dt.toDateString()){fixedOut+=f.amt;fixedItems.push(f);}}
        else if(f.day===dt.getDate()){fixedOut+=f.amt;fixedItems.push(f);}
      });
    }
    var varOut=Math.round((budDir[monthIdx]+budExp[monthIdx])/4.3);
    var totalOut=fixedOut+varOut;
    var net=weeklyIn-totalOut;
    bal+=net;
    var conf=w<4?"high":w<8?"medium":"low";
    results.push({week:w+1,label:`W${w+1}: ${fmtDate(startDt)}–${fmtDate(endDt)}`,
      start_date:startDt.toISOString().slice(0,10),
      opening_balance:bal-net,cash_in:weeklyIn,cash_out:-totalOut,net,closing_balance:bal,confidence:conf});
  }
  return results;
}

function eur(n,k){
  if(n===null||n===undefined||isNaN(n))return"—";
  var a=Math.abs(n),s=a>=1000?Math.round(a).toLocaleString("fi-FI"):a.toFixed(0);
  if(k)return(n<0?"−":"")+"€"+s;
  return(n<0?"−€":"€")+s;
}
function clr(n){return n<0?"txt-red":n>0?"txt-grn":"";}
function confBadge(c){return`<span class="badge ${c==="high"?"b-grn":c==="medium"?"b-amb":"b-gray"}">${c}</span>`;}
function statusBadge(s){return`<span class="badge ${s==="OVERDUE"?"b-red":s==="PAID"?"b-grn":"b-blu"}">${s}</span>`;}

function getWeekFixedOut(startDate){
  var total=0;
  for(var i=0;i<7;i++){
    var dt=addDays(new Date(startDate),i);
    total+=getFixedForDay(dt);
  }
  return total;
}

// Compute WC components for month j (0=Apr, 4=Aug, 8=Dec)
function calcMonthlyWC(j){
  var i=j+3; // BUD12/DIR12 index (3=Apr)
  var rev=getRevArray()[i];
  var dir=getDirArray()[i];
  var month1=i+1; // 1-based month number
  // Weighted DSO across channels using lever overrides
  var totalChRev=CHANNELS.reduce((s,ch)=>s+(ch.rev[j]||0),0);
  var wDso=totalChRev>0?CHANNELS.reduce((s,ch)=>{
    var share=(ch.rev[j]||0)/totalChRev;
    var chDso=ch.name==="Bars & Pubs FI"?S.levers.barsAndPubsDso:
              ch.name==="Export (all)"?S.levers.otherExportDso:ch.dso;
    return s+share*chDso;
  },0):30;
  // Seasonal adj on ~40% of revenue (seasonal customers)
  var seasAdj=(SEAS[month1]||0)*0.4;
  var adjDso=wDso+seasAdj;
  var ccc=adjDso+S.levers.invDays-S.levers.supplierDpo;
  var arBal=Math.round(rev*adjDso/30);
  var invBal=Math.round(dir*S.levers.invDays/30);
  var apBal=Math.round(dir*S.levers.supplierDpo/30);
  var wcReq=arBal+invBal-apBal;
  return{rev,dir,adjDso,ccc,arBal,invBal,apBal,wcReq};
}

// Lever impact at August peak vs baselines (barsAndPubs:41, export:52, dpo:22, inv:42)
function calcLeverImpact(){
  var augBarsRev=CHANNELS[4].rev[4]; // Bars & Pubs Aug = 34,100
  var augExpRev=CHANNELS[5].rev[4];  // Export all Aug = 113,350
  var augDir=DIR12[7];               // Aug direct costs = 115,769
  var barsSave=Math.round(augBarsRev*(41-S.levers.barsAndPubsDso)/30);
  var expSave=Math.round(augExpRev*(52-S.levers.otherExportDso)/30);
  var dpoSave=Math.round(augDir*(S.levers.supplierDpo-22)/30);
  var invSave=Math.round(augDir*(42-S.levers.invDays)/30);
  return{barsSave,expSave,dpoSave,invSave,total:barsSave+expSave+dpoSave+invSave};
}

function setLever(key,val){
  S.levers[key]=parseInt(val);
  updateWCLeverPanel();
}

function updateWCLeverPanel(){
  ['barsAndPubsDso','otherExportDso','supplierDpo','invDays'].forEach(k=>{
    var el=document.getElementById('lv-val-'+k);
    if(el)el.textContent=S.levers[k]+'d';
  });
  var imp=calcLeverImpact();
  var el=document.getElementById('wc-lever-total');
  if(el){
    var t=imp.total;
    el.innerHTML=`<div class="${t>=0?'txt-grn':'txt-red'}" style="font-size:13px;font-weight:700">
      ${t>=0?'↓ Frees':'↑ Uses'} ${eur(Math.abs(t))} WC at August peak vs baseline</div>

  drawCCCChart();drawWCChart();

  var w1=weeks[0]||{}, w4=weeks[3]||{}, w8=weeks[7]||{}, w13=weeks[12]||{};
  return`You are the financial AI for Salama Brewing Company Oy (Finnish craft brewery). Be concise — max 3-4 sentences.

TODAY: 25 Mar 2026 | Bank: ${eur(bank)} | Open AR: ${eur(ar)} | Scenario: ${S.scenario}
Revenue growth: ${((gf-1)*100).toFixed(0)}% YoY
13-week forecast (${S.scenario}):
  W1 close: ${eur(w1.closing_balance)} | W4: ${eur(w4.closing_balance)} | W8: ${eur(w8.closing_balance)} | W13: ${eur(w13.closing_balance)}
Key facts:
- Fixed monthly: Personnel €47,425 + OP Loan €15,356 = €62,781 (immovable)
- Slowest payers: Other Export 57d, Export(Brill) 51d, Systembolaget 48d, Bars&Pubs 41d
- Aug DSO seasonal +11d — peak billing but cash arrives Oct
- Own channels (Espoo Shop, Online) pay in 3-5d = cash accelerators
- Bemböle contract €25K/mo ends after Sep 2026`;
}

async function hSend(){
  var inp=document.getElementById("hInp"),key=sessionStorage.getItem("hk")||document.getElementById("hKey")?.value;
  if(!inp||!inp.value.trim())return;
  if(!key){alert("Add your Anthropic API key below");return;}
  var msg=inp.value.trim();inp.value="";
  hMsgs.push({role:"user",content:msg});hRefresh();
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"x-api-key":key,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-client-side-allow-unsafe":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:350,system:hSysPrompt(),
        messages:hMsgs.map(m=>({role:m.role,content:m.content}))})});
    var d=await r.json();
    hMsgs.push({role:"assistant",content:d.content?.[0]?.text||"Error: "+(d.error?.message||"unknown")});
  }catch(e){hMsgs.push({role:"assistant",content:"Error: "+e.message});}
  hRefresh();
}

function hRefresh(){var el=document.getElementById("hMsgs");if(!el)return;el.innerHTML=hMsgs.map(m=>`<div class="hmsg ${m.role}">${m.content.replace(/\n/g,"<br>")}</div>`).join("");el.scrollTop=el.scrollHeight;}

// ════════════════════════════════════════════════════════════
render();
</script>
