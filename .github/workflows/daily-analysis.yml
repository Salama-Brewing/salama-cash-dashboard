name: Daily Cash Flow Analysis

on:
  # 06:00 Helsinki (EET=UTC+2, EEST=UTC+3)
  # Using UTC+2 (standard time) — GitHub cron is UTC
  # 06:00 EET = 04:00 UTC  |  06:00 EEST = 03:00 UTC
  # Safe middle: 03:00 UTC covers both (fires at 06:00 in summer EEST)
  schedule:
    - cron: '0 3 * * 1-5'   # 06:00 Helsinki (summer EEST = UTC+3), weekdays
    - cron: '0 14 * * 1-5'  # 17:00 Helsinki (summer EEST = UTC+3), weekdays

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      invoice_file:
        description: 'Path to invoice CSV (leave empty for demo data)'
        required: false
        default: ''

jobs:
  analyze:
    name: Run AI Cash Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit insights.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run analysis (demo data)
        if: ${{ github.event.inputs.invoice_file == '' || github.event_name == 'schedule' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node analyze.js

      - name: Run analysis (with invoice file)
        if: ${{ github.event.inputs.invoice_file != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node analyze.js --invoice-file "${{ github.event.inputs.invoice_file }}"

      - name: Commit insights to repo
        run: |
          git config user.name  "Salama Cash Bot"
          git config user.email "bot@salama-brewing.fi"
          git add data/insights.json data/briefings.json data/action_log.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: AI cash analysis + briefings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
