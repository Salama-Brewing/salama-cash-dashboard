name: Daily Cash Sync

on:
  schedule:
    # Run at 06:00 UTC (09:00 Helsinki time) every weekday
    - cron: '0 6 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run Procountor sync
        env:
          PROCOUNTOR_CLIENT_ID: ${{ secrets.PROCOUNTOR_CLIENT_ID }}
          PROCOUNTOR_CLIENT_SECRET: ${{ secrets.PROCOUNTOR_CLIENT_SECRET }}
          PROCOUNTOR_USERNAME: ${{ secrets.PROCOUNTOR_USERNAME }}
          PROCOUNTOR_PASSWORD: ${{ secrets.PROCOUNTOR_PASSWORD }}
        run: |
          # If credentials are set, sync live; otherwise regenerate demo data
          if [ -n "$PROCOUNTOR_CLIENT_ID" ]; then
            echo "Syncing live data from Procountor..."
            python sync.py --out data/cash_data.json
          else
            echo "No credentials set — regenerating demo data..."
            python sync.py --demo --out data/cash_data.json
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cash_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily cash sync $(date -u +%Y-%m-%d)"
            git push
          fi
